<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pointeuse Bazan</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111" />

  <style>
    :root{
      --bg:#f6f6f6;
      --card:#fff;
      --text:#111;
      --muted:#777;
      --shadow: 0 2px 14px rgba(0,0,0,.07);
      --r:16px;
      --pad:14px;
    }
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
      margin:0;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      padding:16px;
      padding-bottom:90px; /* place pour la barre du bas */
      max-width:880px;
      margin:0 auto;
    }
    h1{
      font-size:28px;
      margin:0 0 6px;
      letter-spacing:-.4px;
    }
    .subtitle{ color:var(--muted); margin:0 0 14px; font-size:15px; }

    .card{
      background:var(--card);
      border-radius:var(--r);
      padding:var(--pad);
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .row{ display:flex; gap:10px; align-items:center; }
    .row > *{ flex:1; }

    button{
      width:100%;
      padding:14px;
      border:0;
      border-radius:14px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
    }
    button:disabled{ opacity:.4; cursor:not-allowed; }

    .start{ background:#111; color:#fff; }
    .stop{ background:#d11; color:#fff; }
    .ghost{ background:#eee; color:#111; }

    .pill{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      background:#eee;
      font-size:12px;
      font-weight:600;
    }
    .muted{ color:var(--muted); font-size:13px; }

    table{ width:100%; border-collapse:collapse; font-size:14px; }
    th,td{ padding:8px; border-bottom:1px solid #eee; text-align:left; }

    /* Tabs */
    .tabbar{
      position:fixed;
      left:0; right:0; bottom:0;
      background:rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      border-top:1px solid rgba(0,0,0,.08);
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      display:flex;
      gap:8px;
      justify-content:space-around;
    }
    .tab{
      flex:1;
      border-radius:14px;
      padding:10px 8px;
      text-align:center;
      font-size:12px;
      color:#555;
      font-weight:700;
      user-select:none;
    }
    .tab.active{
      background:#111;
      color:#fff;
    }
    .tab span{ display:block; font-size:18px; margin-bottom:3px; }
    .view{ display:none; }
    .view.active{ display:block; }

    .topstats{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
    }
    .stat{
      background:#f1f1f1;
      border-radius:14px;
      padding:12px;
    }
    .stat .k{ font-size:12px; color:#666; font-weight:700; }
    .stat .v{ font-size:18px; font-weight:800; margin-top:4px; }
  </style>
</head>

<body>

  <div class="wrap">
    <h1>⏱️ Pointeuse</h1>
    <p class="subtitle">Bazan • hors-ligne • rapide</p>

    <!-- VIEW: Pointage -->
    <div id="view-clock" class="view active">
      <div class="card">
        <div class="row">
          <button id="btnStart" class="start">Je pointe</button>
          <button id="btnStop" class="stop" disabled>Je dépointe</button>
        </div>

        <div style="margin-top:10px" class="muted">
          Statut : <span id="status" class="pill">pas pointé</span>
        </div>
        <div style="margin-top:10px" class="muted" id="currentInfo"></div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 8px">📅 Aujourd’hui</h2>
        <div id="today"></div>
      </div>
    </div>

    <!-- VIEW: Semaine -->
    <div id="view-week" class="view">
      <div class="card">
        <h2 style="margin:0 0 8px">📊 Semaine (lun → dim)</h2>
        <div class="muted" id="weekTotal"></div>
        <div id="week" style="margin-top:8px"></div>
      </div>
    </div>

    <!-- VIEW: Mois -->
    <div id="view-month" class="view">
      <div class="card">
        <div class="row">
          <button id="btnPrevMonth" class="ghost">◀</button>
          <div style="text-align:center; font-weight:800" id="monthTitle">Mois</div>
          <button id="btnNextMonth" class="ghost">▶</button>
        </div>
        <div style="height:10px"></div>

        <div class="topstats">
          <div class="stat">
            <div class="k">Total</div>
            <div class="v" id="monthTotal">0h00</div>
          </div>
          <div class="stat">
            <div class="k">Jours</div>
            <div class="v" id="monthDays">0</div>
          </div>
          <div class="stat">
            <div class="k">Sessions</div>
            <div class="v" id="monthSessions">0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 8px">📆 Détails du mois</h2>
        <div id="monthList"></div>
      </div>
    </div>

    <!-- VIEW: Réglages -->
    <div id="view-settings" class="view">
      <div class="card">
        <h2 style="margin:0 0 8px">⚙️ Réglages</h2>
        <div class="row">
          <button id="btnExport" class="ghost">Exporter CSV</button>
          <button id="btnReset" class="ghost" title="Supprime tout">Reset</button>
        </div>
        <div class="muted" style="margin-top:10px">
          Astuce : bientôt on ajoutera un choix de lieu (Bazan / autre) et un salaire.
        </div>
      </div>
    </div>
  </div>

  <!-- Barre du bas -->
  <div class="tabbar">
    <div class="tab active" data-view="clock"><span>⏱️</span>Pointage</div>
    <div class="tab" data-view="week"><span>📊</span>Semaine</div>
    <div class="tab" data-view="month"><span>📆</span>Mois</div>
    <div class="tab" data-view="settings"><span>⚙️</span>Réglages</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
