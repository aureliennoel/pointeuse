<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Pointeuse Bazan</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111111" />

  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
      margin:0;padding:16px;background:#f6f6f6
    }
    .card{
      background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;
      box-shadow:0 2px 10px rgba(0,0,0,.06)
    }
    h1{font-size:20px;margin:0 0 10px}
    button{
      width:100%;padding:14px;border:0;border-radius:12px;
      font-size:16px
    }
    .start{background:#111;color:#fff}
    .stop{background:#d11;color:#fff}
    .row{display:flex;gap:10px}
    .row>*{flex:1}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}
    .muted{color:#777;font-size:13px}
    .pill{
      display:inline-block;padding:4px 10px;border-radius:999px;
      background:#eee;font-size:12px
    }
  </style>
</head>

<body>

<div class="card">
  <h1>⏱️ Pointeuse — Bazan</h1>
  <div class="muted">App perso — heures de travail</div>
</div>

<div class="card">
  <div class="row">
    <button id="btnStart" class="start">Je pointe</button>
    <button id="btnStop" class="stop" disabled>Je dépointe</button>
  </div>

  <div style="margin-top:10px" class="muted">
    Statut : <span id="status" class="pill">pas pointé</span>
  </div>

  <div style="margin-top:10px" class="muted" id="currentInfo"></div>
</div>

<div class="card">
  <h1>📅 Aujourd’hui</h1>
  <div id="today"></div>
</div>

<div class="card">
  <h1>📊 Semaine</h1>
  <div class="muted" id="weekTotal"></div>
  <div id="week"></div>
</div>

<div class="card">
  <div class="row">
    <button id="btnExport">Exporter CSV</button>
    <button id="btnReset">Reset</button>
  </div>
</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
